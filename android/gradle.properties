# Project-wide Gradle settings (low-memory profile)
org.gradle.jvmargs=-Xms128m -Xmx1024m -XX:MaxMetaspaceSize=256m -Xss512k -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configureondemand=false
org.gradle.workers.max=1
kotlin.daemon.jvmargs=-Xmx384m

# Android settings
android.useAndroidX=true
android.enableJetifier=true
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=false
android.nonFinalResIds=false

# Kotlin settings
kotlin.code.style=official

# Performance optimizations
org.gradle.vfs.watch=false
org.gradle.configuration-cache=false
